<title>Weekly Planner</title>

<style>
  :root {
    --bg: #EEF7FF;
    --sidebar-bg: #ffffff;
    --primary: #5BBDE4;
    --primary-light: #A8DEFF;
    --primary-dark: #2E8CB8;
    --primary-xlight: #D6F0FF;
    --text: #1E3A52;
    --text-muted: #6A9ABB;
    --border: #C8E8F8;
    --row-h: 54px;
    --shadow-sm: 0 2px 10px rgba(91, 189, 228, 0.12);
    --shadow-md: 0 6px 24px rgba(91, 189, 228, 0.18);
    --shadow-lg: 0 16px 48px rgba(30, 58, 82, 0.16);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
    box-shadow: var(--shadow-sm);
    z-index: 10;
    flex-shrink: 0;
  }

  .app-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-title .accent { color: var(--primary); }

  .week-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--primary-xlight);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 9px;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-xlight); }

  /* ── Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 195px;
    background: white;
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px 10px;
    gap: 5px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 6px 6px 2px;
  }

  .block-pill {
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.16s ease;
