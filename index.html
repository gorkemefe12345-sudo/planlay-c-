<!DOCTYPE html>
<html lang="en">
<head>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEF7FF;
    --sidebar-bg: #ffffff;
    --primary: #5BBDE4;
    --primary-light: #A8DEFF;
    --primary-dark: #2E8CB8;
    --primary-xlight: #D6F0FF;
    --text: #1E3A52;
    --text-muted: #6A9ABB;
    --border: #C8E8F8;
    --row-h: 54px;
    --shadow-sm: 0 2px 10px rgba(91, 189, 228, 0.12);
    --shadow-md: 0 6px 24px rgba(91, 189, 228, 0.18);
    --shadow-lg: 0 16px 48px rgba(30, 58, 82, 0.16);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
    box-shadow: var(--shadow-sm);
    z-index: 10;
    flex-shrink: 0;
  }

  .app-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-title .accent { color: var(--primary); }

  .week-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--primary-xlight);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 9px;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-xlight); }

  /* ── Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 195px;
    background: white;
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px 10px;
    gap: 5px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 6px 6px 2px;
  }

  .block-pill {
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.16s ease;
    border: 2px solid transparent;
    user-select: none;
    position: relative;
  }

  .block-pill:hover {
    transform: translateX(3px);
    box-shadow: var(--shadow-sm);
  }

  .block-pill.active {
    border-color: rgba(0,0,0,0.18);
    box-shadow: 0 0 0 3px rgba(91, 189, 228, 0.2);
    transform: translateX(3px);
  }

  .pill-icon { font-size: 14px; }
  .pill-label { flex: 1; }

  .pill-check {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .block-pill.active .pill-check { opacity: 1; }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 6px 4px;
  }

  /* Add block form */
  .add-form {
    margin: 2px 0;
    background: var(--bg);
    border-radius: 12px;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .add-form input[type="text"] {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    background: white;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .add-form input[type="text"]::placeholder { color: var(--text-muted); }
  .add-form input[type="text"]:focus { border-color: var(--primary); }

  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-row label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    flex: 1;
  }

  .color-row input[type="color"] {
    width: 36px;
    height: 28px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 2px 3px;
    cursor: pointer;
    background: white;
  }

  .btn-add {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.16s;
    letter-spacing: 0.3px;
  }
  .btn-add:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn-add:active { transform: translateY(0); }

  /* ── Planner ── */
  .planner-wrapper {
    flex: 1;
    overflow: auto;
    padding: 16px 20px 120px;
  }

  .planner {
    display: flex;
    flex-direction: column;
    min-width: 720px;
    background: transparent;
  }

  /* Day headers */
  .day-headers {
    display: grid;
    grid-template-columns: 58px repeat(7, 1fr);
    position: sticky;
    top: 0;
    z-index: 6;
    background: var(--bg);
    padding-bottom: 6px;
    pointer-events: none;
  }

  .day-header {
    text-align: center;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .day-name {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .day-num {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
  }

  .day-header.today .day-name { color: var(--primary-dark); font-weight: 800; }
  .day-header.today .day-num {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(91, 189, 228, 0.5);
  }

  /* Grid */
  .grid-body {
    display: grid;
    grid-template-columns: 58px repeat(7, 1fr);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
  }

  .day-col {
    position: relative;
  }

  .time-col {
    display: flex;
    flex-direction: column;
    background: white;
    border-right: 2px solid var(--border);
  }

  .time-label {
    height: var(--row-h);
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 5px 10px 0 0;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }

  .day-col {
    position: relative;
    background: white;
    border-left: 1px solid var(--border);
  }

  .day-col.today-col { background: #F5FBFF; }

  .hour-cell {
    height: var(--row-h);
    border-bottom: 1px solid var(--border);
    position: relative;
    cursor: crosshair;
    transition: background 0.1s;
  }

  .hour-cell:hover { background: rgba(91,189,228,0.04); }

  .hour-cell::after {
    content: '';
    position: absolute;
    left: 8px; right: 0;
    top: 50%;
    border-bottom: 1px dashed rgba(91,189,228,0.2);
    pointer-events: none;
  }

  /* Placed blocks */
  .placed-block {
    position: absolute;
    left: 3px;
    right: 3px;
    border-radius: 9px;
    padding: 5px 8px;
    font-size: 11px;
    font-weight: 600;
    z-index: 2;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s, transform 0.1s;
    user-select: none;
  }

  .placed-block:hover {
    box-shadow: 0 5px 18px rgba(0,0,0,0.14);
    z-index: 4;
    transform: scale(1.01);
  }

  .block-label-inner {
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .block-time-inner {
    font-size: 9.5px;
    opacity: 0.65;
    font-weight: 500;
    white-space: nowrap;
  }

  .block-note-preview {
    font-size: 9.5px;
    opacity: 0.6;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 400;
    margin-top: 1px;
    font-style: italic;
  }

  .block-actions {
    position: absolute;
    top: 4px;
    right: 4px;
    display: none;
    gap: 3px;
  }

  .placed-block:hover .block-actions { display: flex; }

  .bact-btn {
    width: 19px;
    height: 19px;
    border-radius: 5px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(4px);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    padding: 0;
    transition: background 0.12s;
    line-height: 1;
    color: inherit;
  }
  .bact-btn:hover { background: rgba(255,255,255,0.95); }

  /* Ghost while drawing */
  .ghost-block {
    position: absolute;
    left: 3px;
    right: 3px;
    border-radius: 9px;
    opacity: 0.45;
    z-index: 1;
    pointer-events: none;
    border: 2px dashed rgba(0,0,0,0.15);
    transition: top 0.05s, height 0.05s;
  }

  /* Hint bar */
  #hintBar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    color: white;
    padding: 9px 20px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 500;
    display: none;
    z-index: 50;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
  }

  #hintBar.visible {
    display: block;
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,58,82,0.25);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.18s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: white;
    border-radius: 18px;
    padding: 26px;
    width: 350px;
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: slideUp 0.22s ease;
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .modal-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .modal-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 26px;
    margin-top: -10px;
  }

  .modal textarea {
    width: 100%;
    padding: 11px 13px;
    border-radius: 11px;
    border: 1.5px solid var(--border);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    color: var(--text);
    resize: vertical;
    min-height: 95px;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  .modal textarea:focus { border-color: var(--primary); }
  .modal textarea::placeholder { color: var(--text-muted); }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-save {
    background: var(--primary);
    color: white;
    padding: 9px 22px;
    border-radius: 9px;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.16s;
  }
  .btn-save:hover { background: var(--primary-dark); transform: translateY(-1px); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--text);
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    z-index: 200;
    display: none;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

  .no-select { user-select: none; }
</style>
</head>
<body>

<header>
  <div class="app-title">
    <span style="font-size:18px">🗓</span>
    Weekly <span class="accent">Planner</span>
    <span class="week-label" id="weekLabel"></span>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="clearAll()">🗑 Clear All</button>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-label">Blocks</div>
    <div id="blockPalette"></div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Create Block</div>
    <div class="add-form">
      <input type="text" id="newBlockName" placeholder="Name your block..." maxlength="20">
      <div class="color-row">
        <label>Color</label>
        <input type="color" id="newBlockColor" value="#ADE8FF">
      </div>
      <button class="btn-add" onclick="addCustomBlock()">＋ Add Block</button>
    </div>
  </div>

  <!-- Planner -->
  <div class="planner-wrapper">
    <div class="planner">
      <div class="day-headers" id="dayHeaders"></div>
      <div class="grid-body" id="gridBody"></div>
    </div>
  </div>
</div>

<!-- Hint bar -->
<div id="hintBar"></div>

<!-- Notes Modal -->
<div class="modal-overlay" id="notesModal" style="display:none" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-dot" id="modalDot"></div>
      <div class="modal-title" id="modalTitle"></div>
    </div>
    <div class="modal-sub" id="modalSub"></div>
    <textarea id="modalNotes" placeholder="Add notes, reminders, ideas..."></textarea>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNotes()">Save ✓</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Constants ──
const HOURS = Array.from({length: 19}, (_, i) => i + 6); // 6 AM – 12 AM (midnight)
const DAYS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const ROW_H = 54;

// ── Default block types ──
const DEFAULT_BLOCKS = [
  { id: 'sleeping',  label: 'Sleeping',   color: '#C5DEFF', textColor: '#1E3A6A', emoji: '🌙' },
  { id: 'studying',  label: 'Studying',   color: '#B8EED8', textColor: '#0F4A2E', emoji: '📚' },
  { id: 'free-time', label: 'Free Time',  color: '#FFE0B8', textColor: '#5C3210', emoji: '☀️' },
  { id: 'exercise',  label: 'Exercise',   color: '#D4F4B0', textColor: '#2A5010', emoji: '🏃' },
  { id: 'eating',    label: 'Eating',     color: '#FFF3B0', textColor: '#5C4800', emoji: '🍽️' },
  { id: 'work',      label: 'Work',       color: '#E4D4FF', textColor: '#3A1070', emoji: '💼' },
];

// ── State ──
let blockTypes   = JSON.parse(localStorage.getItem('wkp_types') || 'null') || DEFAULT_BLOCKS;
let placedBlocks = JSON.parse(localStorage.getItem('wkp_placed') || '[]');
let activeId     = null;
let isDrawing    = false;
let drawDay      = null;
let drawStartH   = null;
let drawEndH     = null;
let editingId    = null;
let hintTimer    = null;

// ── Persistence ──
function save() {
  localStorage.setItem('wkp_types',  JSON.stringify(blockTypes));
  localStorage.setItem('wkp_placed', JSON.stringify(placedBlocks));
}

// ── Helpers ──
function fmt(h) {
  if (h === 0 || h === 24) return '12 AM';
  if (h === 12) return '12 PM';
  return h < 12 ? `${h} AM` : `${h - 12} PM`;
}

function getType(id) { return blockTypes.find(b => b.id === id); }

function showHint(msg) {
  clearTimeout(hintTimer);
  const el = document.getElementById('hintBar');
  el.textContent = msg;
  el.classList.add('visible');
  hintTimer = setTimeout(() => el.classList.remove('visible'), 2600);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 1800);
}

// ── Week label ──
function setWeekLabel() {
  const now  = new Date();
  const day  = now.getDay(); // 0=Sun
  const mon  = new Date(now); mon.setDate(now.getDate() - ((day + 6) % 7));
  const sun  = new Date(mon); sun.setDate(mon.getDate() + 6);
  const opts = { month: 'short', day: 'numeric' };
  document.getElementById('weekLabel').textContent =
    `${mon.toLocaleDateString('en', opts)} – ${sun.toLocaleDateString('en', opts)}`;
}

// ── Palette ──
function renderPalette() {
  const el = document.getElementById('blockPalette');
  el.innerHTML = '';
  blockTypes.forEach(bt => {
    const pill = document.createElement('div');
    pill.className = 'block-pill' + (activeId === bt.id ? ' active' : '');
    pill.style.background  = bt.color;
    pill.style.color       = bt.textColor;
    pill.innerHTML = `
      <span class="pill-icon">${bt.emoji || '⬜'}</span>
      <span class="pill-label">${bt.label}</span>
      <span class="pill-check">✓</span>
    `;
    pill.onclick = () => selectBlock(bt.id);
    el.appendChild(pill);
  });
}

function selectBlock(id) {
  activeId = id;
  renderPalette();
  const bt = getType(id);
  showHint(`✏️ "${bt.label}" selected — click & drag on the grid`);
}

// ── Headers ──
function renderHeaders() {
  const el    = document.getElementById('dayHeaders');
  const today = new Date();
  const tidx  = (today.getDay() + 6) % 7; // Mon=0
  el.innerHTML = '<div style="width:58px; flex-shrink:0"></div>';
  DAYS.forEach((d, i) => {
    const dt   = new Date(today);
    dt.setDate(today.getDate() + (i - tidx));
    const div  = document.createElement('div');
    div.className = 'day-header' + (i === tidx ? ' today' : '');
    div.innerHTML = `<div class="day-name">${d}</div><div class="day-num">${dt.getDate()}</div>`;
    el.appendChild(div);
  });
}

// ── Grid ──
function renderGrid() {
  const body  = document.getElementById('gridBody');
  body.innerHTML = '';

  // Time column
  const tc = document.createElement('div');
  tc.className = 'time-col';
  HOURS.forEach(h => {
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.textContent = fmt(h);
    tc.appendChild(lbl);
  });
  body.appendChild(tc);

  const today = new Date();
  const tidx  = (today.getDay() + 6) % 7;

  DAYS.forEach((_, dayIdx) => {
    const col = document.createElement('div');
    col.className = 'day-col' + (dayIdx === tidx ? ' today-col' : '');
    col.dataset.day = dayIdx;

    HOURS.forEach(h => {
      const cell = document.createElement('div');
      cell.className = 'hour-cell';
      cell.dataset.hour = h;
      col.appendChild(cell);
    });

    col.addEventListener('mousedown', e => onDown(e, dayIdx));
    col.addEventListener('mousemove', e => onMove(e, dayIdx));
    body.appendChild(col);
  });

  renderBlocks();
}

// ── Drawing ──
function colRect(dayIdx) {
  return document.querySelector(`.day-col[data-day="${dayIdx}"]`).getBoundingClientRect();
}

function hourFromY(y, dayIdx) {
  const rect = colRect(dayIdx);
  const raw  = Math.floor((y - rect.top) / ROW_H) + 6;
  return Math.min(Math.max(raw, 6), 24);
}

function onDown(e, dayIdx) {
  // Always let clicks on action buttons (delete/notes) through untouched
  if (e.target.closest('.bact-btn')) return;
  if (!activeId) { showHint('👆 Select a block type first'); return; }
  e.preventDefault();
  isDrawing  = true;
  drawDay    = dayIdx;
  drawStartH = hourFromY(e.clientY, dayIdx);
  drawEndH   = drawStartH;
  // Disable pointer-events on all placed blocks so they don't intercept drag
  document.querySelectorAll('.placed-block').forEach(b => b.style.pointerEvents = 'none');
  renderGhost();
}

function onMove(e, dayIdx) {
  if (!isDrawing || drawDay !== dayIdx) return;
  const h = hourFromY(e.clientY, dayIdx);
  if (h !== drawEndH) { drawEndH = h; renderGhost(); }
}

// Global mousemove: update drawEndH even when cursor drifts over placed blocks or other elements
document.addEventListener('mousemove', e => {
  if (!isDrawing || drawDay === null) return;
  const h = hourFromY(e.clientY, drawDay);
  if (h !== drawEndH) { drawEndH = h; renderGhost(); }
});

document.addEventListener('mouseup', () => {
  if (!isDrawing) return;
  isDrawing = false;
  clearGhosts();
  // Re-enable pointer-events on placed blocks
  document.querySelectorAll('.placed-block').forEach(b => b.style.pointerEvents = '');
  if (activeId !== null && drawStartH !== null) {
    const s = Math.min(drawStartH, drawEndH);
    const ev = Math.min(Math.max(drawStartH, drawEndH) + 1, 24);
    placedBlocks.push({
      id: String(Date.now()) + String(Math.random()).slice(2, 6),
      typeId:    activeId,
      day:       drawDay,
      startHour: s,
      endHour:   ev,
      notes:     ''
    });
    save();
    renderBlocks();
  }
  drawStartH = drawEndH = drawDay = null;
});

function clearGhosts() {
  document.querySelectorAll('.ghost-block').forEach(g => g.remove());
}

function renderGhost() {
  clearGhosts();
  if (drawStartH === null || drawDay === null) return;
  const bt  = getType(activeId);
  if (!bt) return;
  const s   = Math.min(drawStartH, drawEndH);
  const e   = Math.max(drawStartH, drawEndH) + 1;
  const col = document.querySelector(`.day-col[data-day="${drawDay}"]`);
  if (!col) return;
  const g   = document.createElement('div');
  g.className    = 'ghost-block';
  g.style.background = bt.color;
  g.style.top    = ((s - 6) * ROW_H) + 'px';
  g.style.height = ((e - s) * ROW_H - 4) + 'px';
  col.appendChild(g);
}

// ── Render blocks ──
function renderBlocks() {
  document.querySelectorAll('.placed-block').forEach(b => b.remove());
  placedBlocks.forEach(pb => {
    const bt  = getType(pb.typeId);
    if (!bt) return;
    const col = document.querySelector(`.day-col[data-day="${pb.day}"]`);
    if (!col) return;
    const hours = pb.endHour - pb.startHour;

    const el = document.createElement('div');
    el.className = 'placed-block';
    el.style.background = bt.color;
    el.style.color      = bt.textColor;
    el.style.top    = ((pb.startHour - 6) * ROW_H + 2) + 'px';
    el.style.height = (hours * ROW_H - 5) + 'px';

    el.innerHTML = `
      <div class="block-label-inner">${bt.emoji} ${bt.label}</div>
      ${hours > 1 ? `<div class="block-time-inner">${fmt(pb.startHour)} – ${fmt(pb.endHour)}</div>` : ''}
      ${pb.notes ? `<div class="block-note-preview">📝 ${pb.notes}</div>` : ''}
      <div class="block-actions">
        <button class="bact-btn" title="Notes" onclick="openNotes('${pb.id}',event)">📝</button>
        <button class="bact-btn" title="Delete" onclick="deleteBlock('${pb.id}',event)">✕</button>
      </div>
    `;

    col.appendChild(el);
  });
}

// ── Block ops ──
function deleteBlock(id, e) {
  e.stopPropagation();
  placedBlocks = placedBlocks.filter(b => b.id !== id);
  save();
  renderBlocks();
}

function openNotes(id, e) {
  e.stopPropagation();
  editingId = id;
  const pb = placedBlocks.find(b => b.id === id);
  if (!pb) return;
  const bt = getType(pb.typeId);
  document.getElementById('modalDot').style.background = bt.color;
  document.getElementById('modalTitle').textContent = `${bt.emoji} ${bt.label}`;
  document.getElementById('modalSub').textContent   = `${DAYS[pb.day]}, ${fmt(pb.startHour)} – ${fmt(pb.endHour)}`;
  document.getElementById('modalNotes').value        = pb.notes || '';
  document.getElementById('notesModal').style.display = 'flex';
  setTimeout(() => document.getElementById('modalNotes').focus(), 60);
}

function closeModal() {
  document.getElementById('notesModal').style.display = 'none';
  editingId = null;
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('notesModal')) closeModal();
}

function saveNotes() {
  const pb = placedBlocks.find(b => b.id === editingId);
  if (pb) {
    pb.notes = document.getElementById('modalNotes').value.trim();
    save();
    renderBlocks();
    showToast('Notes saved ✓');
  }
  closeModal();
}

// Keyboard shortcut: Escape closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey) && editingId) saveNotes();
});

// ── Add custom block ──
function addCustomBlock() {
  const name = document.getElementById('newBlockName').value.trim();
  if (!name) { document.getElementById('newBlockName').focus(); return; }
  const hex  = document.getElementById('newBlockColor').value;

  // Luminance-based text color
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const lum = 0.299*r + 0.587*g + 0.114*b;
  const textColor = lum > 145 ? '#1a2e3d' : '#ffffff';

  const id = 'c_' + Date.now();
  blockTypes.push({ id, label: name, color: hex, textColor, emoji: '⭐' });
  save();
  renderPalette();
  document.getElementById('newBlockName').value = '';
  selectBlock(id);
  showToast(`"${name}" added!`);
}

// Enter key on block name input
document.getElementById('newBlockName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCustomBlock();
});

// ── Clear all ──
function clearAll() {
  if (!placedBlocks.length) { showToast('Nothing to clear!'); return; }
  if (confirm('Clear all blocks from the planner?\nThis cannot be undone.')) {
    placedBlocks = [];
    save();
    renderBlocks();
    showToast('Planner cleared');
  }
}

// ── Init ──
setWeekLabel();
renderPalette();
renderHeaders();
renderGrid();
</script>
</body>
